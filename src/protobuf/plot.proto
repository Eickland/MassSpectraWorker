// text_service.proto
syntax = "proto3";

package plot;
option go_package = "src/protobuf/plot;plot";

message PlotInfo {
  string title = 1;
  int32 width = 2;
  int32 height = 3;
  int32 dpi = 4;
}

service MassListService {

  rpc ProcessMassList (MassListRequest) returns (MassListResponse);

}

message BruttoRange {
    int32 min = 1;
    int32 max = 2;
}

message MassListRequest {

  string spectra_name = 1;
  float low_percentile = 2;
  float high_percentile = 3;
  float rel_error = 4;
  int32 charge_max = 5;
  map<string, BruttoRange> brutto_dict = 6;
  string protocole = 7;
  string spectra_path = 8;
  int32 width = 9;
  int32 height = 10;
  int32 dpi = 11;
  string format = 12;
  map<string, string> options = 13;

}

message MassListResponse {

  bytes image_data = 1;
  string format = 2;
  int64 size_bytes = 3;
  string mime_type = 4;
  int64 generated_at = 5;
  PlotInfo info = 6;
  
}